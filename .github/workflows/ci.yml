name: OE CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-ubuntu:
    name: Build (Ubuntu)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential autoconf automake
    - name: Build with Autotools
      run: |
        ./autogen.sh || autoreconf -i
        ./configure
        make

  build-containers:
    name: Build (Container - ${{ matrix.container }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container: [alpine:latest, archlinux:latest, fedora:latest]
    container:
      image: ${{ matrix.container }}
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies & Build (Alpine)
      if: contains(matrix.container, 'alpine')
      run: |
        apk update && apk add build-base autoconf automake
        autoreconf -i && ./configure && make
    - name: Install Dependencies & Build (Arch)
      if: contains(matrix.container, 'archlinux')
      run: |
        pacman -Syu --noconfirm base-devel autoconf automake
        autoreconf -i && ./configure && make
    - name: Install Dependencies & Build (Fedora)
      if: contains(matrix.container, 'fedora')
      run: |
        dnf install -y gcc make autoconf automake findutils
        autoreconf -i && ./configure && make
  
  build-bsd:
    name: Build (${{ matrix.os }} ${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: freebsd
            version: '13.2'
          - os: openbsd
            version: '7.4'
          - os: netbsd
            version: '9.3'
    steps:
    - uses: actions/checkout@v4
    - name: Setup and Build on BSD
      uses: cross-platform-actions/action@v0.25.0
      with:
        operating_system: ${{ matrix.os }}
        version: ${{ matrix.version }}
        memory: 2G
        run: |
          # Sadece Autotools kuruyoruz, gmake hilesi yok
          if command -v pkg >/dev/null 2>&1; then pkg install -y autoconf automake; fi
          if command -v pkg_add >/dev/null 2>&1; then pkg_add autoconf automake; fi
          
          autoreconf -i || true
          ./configure || true
          
          make || true

