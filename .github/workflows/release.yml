name: Release OE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-source:
    name: Build Source Tarball (For BSD & MacOS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y autoconf automake build-essential
      - name: Generate Tarball
        run: |
          ./autogen.sh || autoreconf -i
          ./configure
          make dist
      - name: Upload Source Artifact
        uses: actions/upload-artifact@v4
        with:
          name: oe-source
          path: "*.tar.gz"

  build-linux-packages:
    name: Build Packages (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            cross_host: ""
            compiler: gcc
            deb_arch: amd64
            rpm_arch: x86_64
          - arch: arm64
            cross_host: aarch64-linux-gnu
            compiler: aarch64-linux-gnu-gcc
            deb_arch: arm64
            rpm_arch: aarch64
          - arch: riscv64
            cross_host: riscv64-linux-gnu
            compiler: riscv64-linux-gnu-gcc
            deb_arch: riscv64
            rpm_arch: riscv64
    steps:
      - uses: actions/checkout@v4
      - name: Install Build Dependencies & FPM
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake build-essential ruby ruby-dev rubygems rpm \
               gcc-aarch64-linux-gnu gcc-riscv64-linux-gnu libarchive-tools
          sudo gem install fpm
      - name: Compile and Stage
        run: |
          ./autogen.sh || autoreconf -i
          if [ -n "${{ matrix.cross_host }}" ]; then
            ./configure --host=${{ matrix.cross_host }} CC=${{ matrix.compiler }}
          else
            ./configure
          fi
          make
          make DESTDIR=/tmp/oe-staging install
      - name: Generate Packages with FPM
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd /tmp/oe-staging
          DEB_ARCH=${{ matrix.deb_arch }}
          RPM_ARCH=${{ matrix.rpm_arch }}
          
          fpm -s dir -t deb -a $DEB_ARCH -n oe -v $VERSION -p $GITHUB_WORKSPACE/oe_${VERSION}_${DEB_ARCH}.deb usr
          fpm -s dir -t rpm -a $RPM_ARCH -n oe -v $VERSION -p $GITHUB_WORKSPACE/oe-${VERSION}-${RPM_ARCH}.rpm usr
          fpm -s dir -t apk -a $RPM_ARCH -n oe -v $VERSION -p $GITHUB_WORKSPACE/oe-${VERSION}-${RPM_ARCH}.apk usr
          fpm -s dir -t pacman -a $RPM_ARCH -n oe -v $VERSION -p $GITHUB_WORKSPACE/oe-${VERSION}-${RPM_ARCH}.pkg.tar.zst usr
      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oe-packages-${{ matrix.arch }}
          path: |
            *.deb
            *.rpm
            *.apk
            *.pkg.tar.zst

  build-extra-ecosystems:
    name: Build Extra Ecosystems (Void, Gentoo, FreeBSD & Docker)
    needs: [build-source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Generate Gentoo Ebuild
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p extra-dist
          cat << EOF > extra-dist/oe-${VERSION}.ebuild
          EAPI=8
          DESCRIPTION="Minimalist C terminal text editor"
          HOMEPAGE="https://github.com/${{ github.repository }}"
          SRC_URI="https://github.com/${{ github.repository }}/archive/refs/tags/v\${PV}.tar.gz -> \${P}.tar.gz"
          LICENSE="MIT"
          SLOT="0"
          KEYWORDS="~amd64 ~arm64 ~riscv64"
          DEPEND="sys-devel/autoconf sys-devel/automake"
          src_prepare() {
              default
              ./autogen.sh || autoreconf -i
          }
          src_configure() {
              econf
          }
          src_compile() {
              emake
          }
          src_install() {
              emake DESTDIR="\${D}" install
          }
          EOF

      - name: Generate Void Linux Template
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cat << EOF > extra-dist/void-template-${VERSION}
          pkgname=oe
          version=${VERSION}
          revision=1
          build_style=gnu-configure
          short_desc="Minimalist C terminal text editor"
          maintainer="Okan Akyuz <okanakyuz@users.noreply.github.com>"
          license="MIT"
          homepage="https://github.com/${{ github.repository }}"
          distfiles="https://github.com/${{ github.repository }}/archive/refs/tags/v\${version}.tar.gz"
          EOF

      - name: Build FreeBSD Native Package
        uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: '13.3'
          memory: 2G
          run: |
            sudo pkg install -y autoconf automake pkgconf
            autoreconf -i
            ./configure
            make
            make DESTDIR=/tmp/freebsd-stage install
            pkg create -r /tmp/freebsd-stage -o /tmp/
            cp /tmp/*.txz $GITHUB_WORKSPACE/extra-dist/

      - name: Upload Extra Ecosystem Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oe-extra-dist
          path: extra-dist/*

  publish-release:
    name: Publish to GitHub Releases
    needs: [build-source, build-linux-packages, build-extra-ecosystems]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
